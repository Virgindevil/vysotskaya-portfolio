<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Страница не найдена | Высоцкая Добрава</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f8f9fa;
        }
        .error-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            color: #C4704D;

        }
        .error-content p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <p>Страница не найдена</p>
            <a href="index.html" class="btn btn--primary">Вернуться на главную</a>
